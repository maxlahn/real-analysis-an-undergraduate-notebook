</h2>
<div class="para">Two elements <span class="process-math">\(x_{ 1 } , x_{ 2 } \in X \)</span> in a partially ordered set <span class="process-math">\(\of{ X , \preceq } \)</span> are called <dfn class="terminology">comparable</dfn> if either <span class="process-math">\(x_{ 1 } \preceq x_{ 2 } \)</span> or <span class="process-math">\(x_{ 2 } \preceq x_{ 1 } \text{,}\)</span> and <dfn class="terminology">incomparable</dfn> otherwise.<div class="autopermalink" data-description="Paragraph"><a href="#definition-comparability-3-1" title="Copy heading and permalink for Paragraph" aria-label="Copy heading and permalink for Paragraph">🔗</a></div>
